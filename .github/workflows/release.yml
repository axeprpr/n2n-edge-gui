name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            needs_deps: true
          - platform: windows/amd64

    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux/amd64'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgl1-mesa-dev
        timeout-minutes: 10

      - name: Build ${{ matrix.platform }}
        working-directory: desktop
        run: |
          wails build -platform ${{ matrix.platform }} -o n2nGUI.${{ matrix.platform == 'windows/amd64' && 'exe' || '' }}

      - name: Rename output
        run: |
          if [ "${{ matrix.platform }}" = "linux/amd64" ]; then
            cp desktop/build/bin/n2nGUI n2nGUI-linux-x64
          else
            cp desktop/build/bin/n2nGUI.exe n2nGUI-windows-x64.exe
          fi

      - name: Upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            n2nGUI-linux-x64
            n2nGUI-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-arm64:
    runs-on: [self-hosted, linux, arm64]
    if: false  # Disable until arm64 runner available
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Linux build dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev > /dev/null 2>&1

      - name: Build linux/arm64
        working-directory: desktop
        run: |
          wails build -platform linux/arm64 -o n2nGUI-linux-arm64

      - name: Upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: n2nGUI-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
